# Run from api_client/service/  :  docker compose up --build
#
# The build context is the anubix/ root so the Dockerfile can COPY both
# api_client/ and anubix_ws/agent_config/.
#
# Kernel TUN mode is REQUIRED — tailscale's userspace-networking mode
# cannot carry the SSH tunnel this service opens to the Jetson (paramiko
# makes a direct TCP connect; it doesn't go through SOCKS5). The cap_add
# + devices blocks below grant the privileges tailscaled needs to bring up
# a real tun interface. The entrypoint refuses to start without them.

services:
  anubix-api-client:
    image: abdelrahmanatef01/anubix-api-client:latest
    # Comment `image:` and uncomment `build:` to rebuild locally.
    # build:
    #   context: ../..                           # the anubix/ root
    #   dockerfile: api_client/service/Dockerfile
    network_mode: "host"
    container_name: anubix-api-client
    restart: unless-stopped

    env_file:
      - /home/ubuntu/.env                       # see .env.example

    ports:
      - "6000:6000"

    # Persist tailscale state across container restarts so we don't have to
    # re-authenticate every boot.
    volumes:
      - tailscale-state:/var/lib/tailscale

    # Kernel TUN mode (mandatory). The entrypoint refuses to start without
    # /dev/net/tun mounted, because tailscale userspace mode silently
    # breaks the SSH tunnel.
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

volumes:
  tailscale-state:
